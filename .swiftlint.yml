included:
  - App
  - Packages
  - Tests
excluded:
  - Pods
  - .build
  - Legacy

line_length:
  warning: 180
  error: 240

function_body_length:
  warning: 120
  error: 180

cyclomatic_complexity:
  warning: 15
  error: 25

type_body_length:
  warning: 350

file_length:
  warning: 600

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y

opt_in_rules:
  - empty_count
  - explicit_init
  - redundant_nil_coalescing

disabled_rules:
  - todo
  - static_over_final_class
