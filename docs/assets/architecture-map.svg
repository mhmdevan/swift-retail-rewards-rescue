<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6FAFB"/>
      <stop offset="1" stop-color="#EAF3F5"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="980" fill="url(#bg)"/>

  <text x="70" y="86" fill="#0C2436" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="44" font-weight="800">Architecture Map</text>
  <text x="70" y="126" fill="#3D5A68" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="24">Legacy shell stability with incremental modernization seams.</text>

  <rect x="70" y="180" width="1460" height="156" rx="20" fill="#FFFFFF" stroke="#C8DDE6"/>
  <text x="100" y="225" fill="#144A68" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="28" font-weight="700">App Layer (UIKit Shell)</text>
  <text x="100" y="264" fill="#284B5A" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="23">SceneDelegate, AppCoordinator, DI container, tab navigation, diagnostics entry.</text>
  <text x="100" y="298" fill="#284B5A" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="23">Auth, Offers, Saved, Inbox, Membership, Wallet, Settings screens.</text>

  <rect x="70" y="370" width="700" height="230" rx="20" fill="#FFFFFF" stroke="#B8D4DF"/>
  <text x="100" y="415" fill="#155074" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="28" font-weight="700">Legacy Path</text>
  <text x="100" y="455" fill="#2A5568" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="23">UIKit + RxSwift + Alamofire</text>
  <text x="100" y="490" fill="#2A5568" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="23">Reactive offers feed, pagination, state machine.</text>
  <text x="100" y="525" fill="#2A5568" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="23">Objective-C bridge for loyalty barcode logic.</text>
  <text x="100" y="560" fill="#2A5568" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="23">CocoaPods root dependency model.</text>

  <rect x="830" y="370" width="700" height="230" rx="20" fill="#FFFFFF" stroke="#B8D4DF"/>
  <text x="860" y="415" fill="#155074" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="28" font-weight="700">Modern Path</text>
  <text x="860" y="455" fill="#2A5568" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="23">SwiftUI wallet island in UIHostingController.</text>
  <text x="860" y="490" fill="#2A5568" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="23">URLSession + async/await repository module.</text>
  <text x="860" y="525" fill="#2A5568" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="23">SPM-first modular boundaries.</text>
  <text x="860" y="560" fill="#2A5568" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="23">Forward-compatible feature migration seam.</text>

  <rect x="70" y="634" width="1460" height="144" rx="20" fill="#FFFFFF" stroke="#B8D4DF"/>
  <text x="100" y="680" fill="#155074" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="28" font-weight="700">Shared Data and Routing Boundaries</text>
  <text x="100" y="719" fill="#2A5568" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="23">Core Data stores, route contracts/parser, offer domain models, save/expiry policy services.</text>
  <text x="100" y="753" fill="#2A5568" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="23">Both legacy and modern paths converge through stable contracts.</text>

  <rect x="70" y="812" width="1460" height="112" rx="20" fill="#FFFFFF" stroke="#B8D4DF"/>
  <text x="100" y="857" fill="#155074" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="28" font-weight="700">Operations Layer</text>
  <text x="100" y="893" fill="#2A5568" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="23">Structured logging, Sentry non-fatal capture, MetricKit, BGTaskScheduler refresh pipeline, diagnostics tooling.</text>

  <path d="M770 485H830" stroke="#4F7E95" stroke-width="4" stroke-dasharray="10 10"/>
  <path d="M800 600V634" stroke="#4F7E95" stroke-width="4" stroke-dasharray="10 10"/>
  <path d="M800 778V812" stroke="#4F7E95" stroke-width="4" stroke-dasharray="10 10"/>
</svg>
